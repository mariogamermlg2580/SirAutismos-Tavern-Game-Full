name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Unsigned IPA No Simulator
    runs-on: macos-15

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned IPA
        working-directory: ios/SirAutismosTavern
        run: |
          chmod +x build_unsigned_ipa.sh
          ./build_unsigned_ipa.sh

      - name: Show IPA files
        run: |
          echo "Looking for IPA files..."
          find ios/SirAutismosTavern -name "*.ipa" -print
          echo "iOS dist folder:"
          ls -la ios/SirAutismosTavern/dist || true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sir-Autismos-Tavern-unsigned-IPA
          path: "ios/SirAutismosTavern/**/*.ipa"
          if-no-files-found: error
